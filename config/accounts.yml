    email_address: flemming.reese@gmail.com
    imap_host: imap.gmail.com
    imap_port: 993
    provider: gmail
    password_env: ACCOUNT_GMAIL_PASSWORD
    folders:
      - INBOX
      - "[Gmail]/Spam"
      - Arbeit
      - Privat
      - Belege
